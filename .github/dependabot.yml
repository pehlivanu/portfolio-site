version: 2
updates:
  # Maintain dependencies for npm
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    
    # Group minor and patch updates together to reduce PR spam!
    # This makes the project "take care of itself" by only giving you 1 PR per week for safe updates.
    groups:
      dependencies-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

    ignore:
      # Ignore typescript v7 until eslint parser is fixed
      - dependency-name: "typescript"
        versions: [">= 7.0.0"]

    # Auto-merge settings can be enabled in repository settings,
    # but grouping them like this means you only have to click "Merge" once a week.
    commit-message:
      prefix: "chore(deps)"
      
  # Maintain GitHub Actions dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
